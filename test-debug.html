<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>识别功能调试</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        textarea { width: 100%; height: 120px; margin: 10px 0; font-size: 14px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #E8A87C; color: white; border: none; border-radius: 8px; }
        button:hover { background: #d99a6e; }
        #result { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px; white-space: pre-wrap; font-family: monospace; font-size: 13px; }
        .error { color: #d32f2f; background: #ffebee; }
        .success { color: #388e3c; background: #e8f5e9; }
        h3 { margin-top: 0; }
    </style>
</head>
<body>
    <h1>🧪 识别功能调试</h1>
    <p>粘贴文字后点击测试按钮：</p>
    <textarea id="test-input">学校党委常委会（2026年第6次）定于4月15日上午9:30在白云校区德新楼666会议室召开会议</textarea>
    <button onclick="testRecognize()">🔍 测试识别</button>
    <div id="result">等待测试...</div>

    <script src="app.js"></script>
    <script>
        function testRecognize() {
            const input = document.getElementById('test-input');
            const resultDiv = document.getElementById('result');
            const text = input.value.trim();
            
            if (!text) {
                resultDiv.innerHTML = '<div class="error"><h3>❌ 请输入文字</h3></div>';
                return;
            }
            
            try {
                console.log('=== 开始测试 ===');
                console.log('输入文本:', text);
                console.log('SmartRecognizer 存在:', typeof SmartRecognizer);
                console.log('TIME_PATTERNS:', SmartRecognizer.TIME_PATTERNS.length);
                
                // 测试时间解析
                let timeResult = null;
                for (const { pattern, handler } of SmartRecognizer.TIME_PATTERNS) {
                    const match = text.match(pattern);
                    if (match) {
                        console.log('✅ 匹配成功:', pattern);
                        console.log('匹配结果:', match);
                        try {
                            timeResult = handler(match);
                            console.log('解析时间:', timeResult);
                            break;
                        } catch (e) {
                            console.error('handler 错误:', e);
                        }
                    }
                }
                
                if (!timeResult) {
                    console.log('❌ 没有匹配到时间');
                }
                
                // 测试完整识别
                const result = SmartRecognizer.recognize(text);
                console.log('识别结果:', result);
                
                resultDiv.innerHTML = `
                    <div class="success">
                        <h3>✅ 识别成功</h3>
                        <strong>标题：</strong>${result.title}\n
<strong>分类：</strong>${result.category === 'work' ? '💼 工作' : '🏠 生活'}\n
<strong>截止时间：</strong>${result.deadline || '无'}\n
<strong>原文：</strong>${result.desc.substring(0, 200)}...
                    </div>
                `;
            } catch (e) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ 识别失败</h3>
                        <strong>错误信息：</strong>${e.message}\n
<strong>错误堆栈：</strong>${e.stack}
                    </div>
                `;
                console.error('Recognition error:', e);
            }
        }
        
        // 页面加载后自动测试一次
        window.onload = function() {
            console.log('页面加载完成');
            testRecognize();
        };
    </script>
</body>
</html>
