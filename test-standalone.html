<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>独立测试</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        textarea { width: 100%; height: 100px; }
        button { padding: 10px 20px; margin: 10px 0; }
        #log { background: #f0f0f0; padding: 10px; margin-top: 20px; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>
    <h1>独立测试（不加载 app.js）</h1>
    <textarea id="input">学校党委常委会定于2026年5月18日14:00召开会议</textarea>
    <br>
    <button id="btn">识别日程</button>
    <div id="log">等待点击...</div>

    <script>
        const log = document.getElementById('log');
        function addLog(msg) {
            log.textContent += '\n' + msg;
            console.log(msg);
        }
        
        // 内嵌 SmartRecognizer 代码（完整版）
        const SmartRecognizer = {
            TIME_PATTERNS: [
                // 2026年4月7日 17:00
                { pattern: /(\d{4})年(\d{1,2})月(\d{1,2})[日号]\s*(\d+)?[点:：]?(\d*)/, handler: function(m) {
                    const year = m[1];
                    const month = m[2].padStart(2, '0');
                    const day = m[3].padStart(2, '0');
                    const hour = (m[4] || '09').padStart(2, '0');
                    const minute = (m[5] || '00').padStart(2, '0');
                    return `${year}-${month}-${day}T${hour}:${minute}`;
                } },
                // 4月15日上午9:30（无空格紧挨着）
                { pattern: /(\d{1,2})月(\d{1,2})[日号][上午下午晚上](\d+)[点:：](\d*)/, handler: function(m) { 
                    const date = new Date();
                    date.setMonth(parseInt(m[1]) - 1, parseInt(m[2]));
                    date.setHours(parseInt(m[3]), parseInt(m[4] || '00'), 0, 0);
                    const year = date.getFullYear();
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    const hour = String(date.getHours()).padStart(2, '0');
                    const minute = String(date.getMinutes()).padStart(2, '0');
                    return `${year}-${month}-${day}T${hour}:${minute}`;
                } },
                // 4月7日 17:00（有空格版本）
                { pattern: /(\d{1,2})月(\d{1,2})[日号]\s*(\d+)?[点:：]?(\d*)/, handler: function(m) { 
                    const date = new Date();
                    date.setMonth(parseInt(m[1]) - 1, parseInt(m[2]));
                    date.setHours(parseInt(m[3] || '9'), parseInt(m[4] || '00'), 0, 0);
                    const year = date.getFullYear();
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    const hour = String(date.getHours()).padStart(2, '0');
                    const minute = String(date.getMinutes()).padStart(2, '0');
                    return `${year}-${month}-${day}T${hour}:${minute}`;
                } }
            ],
            
            parseTime(text) {
                for (const { pattern, handler } of this.TIME_PATTERNS) {
                    const match = text.match(pattern);
                    if (match) {
                        return handler(match);
                    }
                }
                return null;
            },
            
            recognize(text) {
                return {
                    title: '测试标题',
                    category: 'work',
                    deadline: this.parseTime(text),
                    desc: text
                };
            }
        };
        
        document.getElementById('btn').addEventListener('click', function() {
            log.textContent = '--- 开始识别 ---';
            const text = document.getElementById('input').value.trim();
            addLog('输入: ' + text.substring(0, 50));
            
            try {
                const result = SmartRecognizer.recognize(text);
                addLog('✅ 成功!');
                addLog('标题: ' + result.title);
                addLog('时间: ' + result.deadline);
            } catch(e) {
                addLog('❌ 错误: ' + e.message);
            }
        });
    </script>
</body>
</html>
