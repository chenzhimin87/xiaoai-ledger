<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>识别功能测试</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        textarea { width: 100%; height: 100px; margin: 10px 0; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>🧪 识别功能测试</h1>
    <p>粘贴文字后点击测试按钮：</p>
    <textarea id="test-input" placeholder="例如：明天下午3点部门会议"></textarea>
    <button onclick="testRecognize()">🔍 测试识别</button>
    <div id="result"></div>

    <script src="app.js"></script>
    <script>
        function testRecognize() {
            const input = document.getElementById('test-input');
            const resultDiv = document.getElementById('result');
            const text = input.value.trim();
            
            if (!text) {
                resultDiv.innerHTML = '<p class="error">请输入文字</p>';
                return;
            }
            
            try {
                console.log('Testing recognition with:', text);
                console.log('SmartRecognizer exists:', typeof SmartRecognizer);
                
                const result = SmartRecognizer.recognize(text);
                
                resultDiv.innerHTML = `
                    <h3>✅ 识别成功</h3>
                    <p><strong>标题：</strong>${result.title}</p>
                    <p><strong>分类：</strong>${result.category === 'work' ? '💼 工作' : '🏠 生活'}</p>
                    <p><strong>截止时间：</strong>${result.deadline || '无'}</p>
                    <p><strong>原文：</strong>${result.desc.substring(0, 100)}...</p>
                `;
            } catch (e) {
                resultDiv.innerHTML = `
                    <h3 class="error">❌ 识别失败</h3>
                    <p class="error">错误信息：${e.message}</p>
                    <p>请打开浏览器控制台 (F12) 查看详细错误</p>
                `;
                console.error('Recognition error:', e);
            }
        }
    </script>
</body>
</html>
